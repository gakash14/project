
<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="gradient-bg">

<div class="center-card">

<div class="card shadow-lg p-4 form-card">

<h3 class="text-center mb-4">Create Account</h3>

<input id="name" class="form-control mb-3" placeholder="Full Name">
<input id="email" class="form-control mb-3" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button id="registerBtn" class="btn btn-primary w-100">Register</button>

<p class="text-center mt-3">
Already registered? <a href="login.html">Login</a>
</p>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/register.js"></script>

</body>
</html>
