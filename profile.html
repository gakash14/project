
<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="gradient-bg">

<div class="center-card">

<div class="card shadow-lg p-4 form-card">

<h3 class="text-center mb-4">Your Profile</h3>

<input id="age" class="form-control mb-3" placeholder="Age">
<input id="dob" class="form-control mb-3" placeholder="Date of Birth">
<input id="contact" class="form-control mb-3" placeholder="Contact Number">

<button id="updateBtn" class="btn btn-primary w-100">Update Profile</button>

<button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>

</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

<script>
function logout(){
localStorage.removeItem("userid");
window.location="login.html";
}
</script>

</body>
</html>
